<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSK Lovendegem · U13 IP Spelersplatform</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--sidebar:#0a1628;--accent:#fbbf24;--accent-dk:#1d4ed8;--bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--blue:#1d4ed8;--yellow:#eab308}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);height:100vh;overflow:hidden;color:var(--text)}
#loading{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);z-index:999}
#toast{position:fixed;bottom:20px;right:20px;background:var(--accent-dk);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:998}
#toast.on{opacity:1;transform:translateY(0)}
#toast.err{background:#dc2626}
.screen{display:none;position:fixed;inset:0;z-index:10;align-items:center;justify-content:center;overflow-y:auto;padding:16px 0}
.screen.on{display:flex}

/* LOGIN */
#s-login{align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0d1b2a 0%,#0a2a1a 100%)}
.login-card{background:#fff;border-radius:14px;padding:36px 32px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;font-size:38px;margin-bottom:8px}
.login-h1{text-align:center;font-size:17px;font-weight:700;margin-bottom:2px}
.login-sub{text-align:center;font-size:11px;color:var(--muted);margin-bottom:20px}
.demo-banner{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:10px 12px;font-size:11px;color:#92400e;margin-bottom:14px;line-height:1.5}
.lf{margin-bottom:12px}
.lf label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:3px}
.lf input{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s}
.lf input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent-dk);color:#fff;border:none;border-radius:7px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.login-btn:hover{background:#166534}
.login-btn:disabled{background:#86efac;cursor:not-allowed}
.demo-btn{width:100%;background:#f1f5f9;color:#475569;border:1px solid var(--border);border-radius:7px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px}
.demo-btn:hover{background:#e2e8f0}
.login-err{margin-top:10px;text-align:center;font-size:12px;color:#dc2626;min-height:16px}

/* APP */
#s-app{height:100vh;width:100%}
.layout{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:240px;min-width:240px;background:var(--sidebar);display:flex;flex-direction:column;height:100vh}
.sb-head{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-label{font-size:9px;font-weight:700;letter-spacing:.12em;color:#fbbf24;text-transform:uppercase;margin-bottom:3px}
.sb-team{font-size:15px;font-weight:700;color:#fff}
.sb-stats{display:flex;gap:6px;margin-top:10px}
.sbox{flex:1;border-radius:6px;padding:6px 8px;text-align:center;background:rgba(255,255,255,.05)}
.sbox.g{background:rgba(74,222,128,.1)}
.sbox-n{font-size:15px;font-weight:700;color:#fff}
.sbox.g .sbox-n{color:#fbbf24}
.sbox-l{font-size:8px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.3)}
.sbox.g .sbox-l{color:rgba(251,191,36,.5)}
.sb-search{padding:8px 10px}
.sb-wrap{position:relative}
.sb-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px;color:rgba(255,255,255,.3);pointer-events:none}
.sb-search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:7px 8px 7px 28px;color:#fff;font-size:12px;outline:none;box-sizing:border-box}
.sb-search input::placeholder{color:rgba(255,255,255,.3)}
#player-list{flex:1;overflow-y:auto}
.pi{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.pi:hover{background:rgba(255,255,255,.04)}
.pi.sel{background:rgba(74,222,128,.08);border-left-color:#fbbf24}
.pav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:#1e293b;color:rgba(255,255,255,.3)}
.pav.s{background:#713f12;color:#fbbf24}
.pav.c{background:#14532d;color:#fbbf24}
.pinfo{flex:1;min-width:0}
.pname{font-size:12px;font-weight:500;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pprog{display:flex;align-items:center;gap:4px;margin-top:3px}
.pbar{flex:1;height:2px;background:rgba(255,255,255,.08);border-radius:99px}
.pfill{height:2px;border-radius:99px;background:#fbbf24}
.pfill.c{background:#4ade80}
.ppct{font-size:9px;color:rgba(255,255,255,.25)}
.sb-foot{padding:8px 10px;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:7px}
.sb-foot-row{display:flex;justify-content:space-between;align-items:center}
#foot-txt{font-size:10px;color:rgba(255,255,255,.2)}
.logout-btn{font-size:10px;color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:4px}
.logout-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.demo-badge{background:rgba(251,191,36,.15);color:#fbbf24;font-size:9px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:6px}
.io-btns{display:flex;gap:5px}
.io-btn{flex:1;font-size:10px;padding:5px 4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:5px;color:rgba(255,255,255,.45);cursor:pointer;text-align:center}
.io-btn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#empty-state{flex:1;width:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.empty-card{text-align:center;background:#fff;border-radius:16px;padding:40px 48px;border:1px solid #e8eeea;box-shadow:0 2px 12px rgba(0,0,0,.06);max-width:420px;width:100%;margin:auto}
.empty-logo{width:110px;height:auto;margin:0 auto 14px;display:block}
.empty-club{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:3px}
.empty-season-lbl{font-size:12px;color:#64748b;margin-bottom:24px}
.empty-stats{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.es-box{background:#f4faf6;border-radius:10px;padding:12px 18px;flex:1}
.es-n{font-size:22px;font-weight:700;color:#1d4ed8}
.es-l{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin-top:2px}
.empty-hint{font-size:12px;color:#94a3b8;background:#f8fafc;padding:8px 18px;border-radius:99px;display:inline-block;border:1px solid #e2e8f0}
#detail{display:none;flex:1;flex-direction:column;overflow:hidden}
#detail.on{display:flex}

/* PLAYER HEADER */
.p-head{background:#0a1628;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.p-head-l{display:flex;align-items:center;gap:12px}
#back-btn{display:none;background:none;border:none;cursor:pointer;padding:0 10px 0 0;font-size:20px;color:rgba(255,255,255,.6)}
#hdr-av{width:44px;height:44px;border-radius:50%;background:#1d4ed8;border:2px solid rgba(251,191,36,.4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
#hdr-name{font-size:18px;font-weight:700;color:#fff;line-height:1.2}
#hdr-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
#save-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.15);cursor:not-allowed;background:rgba(255,255,255,.08);color:rgba(255,255,255,.35);transition:all .15s;white-space:nowrap}
#save-btn.dirty{background:#1d4ed8;color:#fff;cursor:pointer;border-color:#1d4ed8}
#save-btn.saved{background:#1d4ed8;color:#fff;border-color:#1d4ed8}

/* TABS */
.tab-nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto;flex-shrink:0;box-shadow:0 1px 0 var(--border)}
.tab-btn{display:flex;align-items:center;gap:5px;padding:11px 14px;font-size:12px;font-weight:500;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .15s}
.tab-btn.on{border-bottom-color:var(--accent-dk);color:var(--accent-dk);font-weight:600}
.tab-btn:hover:not(.on){color:var(--text)}

/* TAB BODY */
.tab-body{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
.tab-pane{display:none;flex-direction:column;gap:16px}
.tab-pane.on{display:flex}

/* 2-col grid for planning on desktop */
@media (min-width:900px){
  #tp-planning.on{display:grid;grid-template-columns:3fr 2fr;align-items:start;gap:16px}
}

/* CARDS */
.card{background:#fff;border-radius:12px;border:1px solid #e8eeea;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.05),0 1px 6px rgba(0,0,0,.03)}
.card-t{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.fields{display:flex;flex-direction:column;gap:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:600;color:#475569}
.field input,.field textarea{border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);outline:none;font-family:inherit;width:100%;transition:all .15s;background:#fff}
.field input:focus,.field textarea:focus{border-color:var(--accent-dk);box-shadow:0 0 0 3px rgba(21,128,61,.08)}
.field input[readonly]{background:#f8fafc;color:#94a3b8}
.field textarea{resize:vertical;line-height:1.5}
.tg{display:flex;gap:6px;flex-wrap:wrap}
.tgb{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#f8fafc;color:var(--muted);transition:all .15s}
.tgb.on{background:var(--accent-dk);color:#fff;border-color:var(--accent-dk)}
.tgb:hover:not(.on){border-color:var(--accent-dk);color:var(--accent-dk);background:#f0fdf4}

/* MULTI-SELECT */
.ms-block{display:flex;flex-direction:column;gap:10px}
.ms-section{background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.ms-cat{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.ms-section.cat-technisch{background:#f3f4f6;border:1px solid #e5e7eb;border-left:3px solid #9ca3af}
.ms-section.cat-technisch .ms-cat{color:#374151}
.ms-section.cat-taktisch{background:#ffffff;border:1px solid #e5e7eb;border-left:3px solid #d1d5db}
.ms-section.cat-taktisch .ms-cat{color:#374151}
.ms-section.cat-fysiek{background:#f3f4f6;border:1px solid #e5e7eb;border-left:3px solid #9ca3af}
.ms-section.cat-fysiek .ms-cat{color:#374151}
.ms-section.cat-mentaal{background:#ffffff;border:1px solid #e5e7eb;border-left:3px solid #d1d5db}
.ms-section.cat-mentaal .ms-cat{color:#374151}
.ms-pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);transition:all .12s}
.pill.on{background:var(--accent-dk);color:#fff;border-color:var(--accent-dk)}
.pill:hover:not(.on){border-color:var(--accent-dk);color:var(--accent-dk)}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:13px;font-weight:600}
.cal-nav{background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.cal-nav:hover{background:var(--bg);color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-hdr{text-align:center;font-size:10px;font-weight:600;color:#94a3b8;padding:4px 0}
.cal-day{text-align:center;padding:7px 2px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid transparent;transition:all .1s;color:#374151;user-select:none}
.cal-day:hover:not(.empty){background:#f0fdf4;border-color:#bbf7d0}
.cal-day.unavail{background:#fee2e2;color:#dc2626;font-weight:600;border-color:#fca5a5}
.cal-day.range-start{border:2px dashed #d97706!important}
.cal-day.today{outline:2px solid #86efac;outline-offset:-2px}
.cal-day.empty{cursor:default;pointer-events:none}
.cal-legend{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.cal-leg{display:flex;align-items:center;gap:5px}
.cal-leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.cal-periods{margin-top:10px;padding:10px 13px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;color:#1d4ed8;font-weight:500;line-height:1.7}

/* WEDSTRIJDEN */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px;color:#94a3b8;text-align:center}
.coming-soon .icon{font-size:44px}
.coming-soon h3{font-size:15px;font-weight:600;color:#475569}
.coming-soon p{font-size:13px;line-height:1.7;max-width:320px}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:99px}

/* TEAM STATS */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;text-align:left}
.team-group{background:#f8fafc;border-radius:10px;padding:12px 14px;border:1px solid #e2e8f0}
.team-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.team-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.wdl-row{display:flex;gap:6px}
.wdl-box{flex:1;text-align:center}
.wdl-n{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:5px 2px;font-size:16px;font-weight:700;color:#1d4ed8;text-align:center;background:#fff;outline:none}
.wdl-n:focus{border-color:#1d4ed8}
.wdl-l{font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-top:3px;text-align:center}

/* BASISFICHE HEADER */
.basisfiche-header{display:flex;align-items:center;gap:12px;padding:14px 0;margin-bottom:14px;border-bottom:2px solid #e8eeea}
.bf-title{font-size:15px;font-weight:700;color:#0f172a;line-height:1.3}
.bf-sub{font-size:11px;color:#64748b;margin-top:3px}

/* SECTION HEADINGS */
.section-heading{font-size:14px;font-weight:700;padding:8px 12px;border-radius:8px;margin-bottom:2px;letter-spacing:.01em}
.section-heading.green{background:#f0fdf4;color:#1d4ed8;border-left:3px solid #1d4ed8}
.section-heading.orange{background:#fff7ed;color:#c2410c;border-left:3px solid #f97316}

/* MOBILE */
@media (max-width:768px){
  /* Sidebar: hidden by default, slides in as overlay */
  .sb{position:fixed;top:0;left:0;height:100%;width:80%!important;max-width:300px;min-width:unset!important;z-index:30;transform:translateX(-100%);transition:transform .28s ease;box-shadow:4px 0 24px rgba(0,0,0,.35)}
  .sb.open{transform:translateX(0)}
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:29}
  .sb-overlay.show{display:block}
  /* Main fills full screen */
  .main{width:100%;height:100dvh;display:flex;flex-direction:column}
  /* Empty state scrollable on mobile */
  #empty-state{padding:16px;overflow-y:auto;align-items:flex-start}
  .empty-card{margin:0 auto}
  /* Detail */
  #detail.on{flex:1;min-height:0;display:flex;flex-direction:column}
  .tab-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
  /* Form */
  .frow{grid-template-columns:1fr!important}
  /* Header */
  .p-head{padding:12px 14px}
  #hdr-name{font-size:15px}
  #hdr-av{width:38px;height:38px;font-size:12px}
  #save-btn{padding:7px 12px;font-size:11px}
  #back-btn{display:block!important}
  /* Tabs */
  .tab-nav{padding:0 8px}
  .tab-btn{padding:9px 10px;font-size:11px;gap:3px}
  .tab-body{padding:14px 12px}
  .card{padding:14px 16px}
  #tp-planning.on{flex-direction:column!important}
  /* Close button in sidebar */
  .sb-close{display:flex!important}
  /* Show list button in empty state */
  .show-list-btn{display:block!important}
  /* Team grid stacked on mobile */
  .team-grid{grid-template-columns:1fr}
}
@media (min-width:769px){
  .sb-overlay{display:none!important}
  .sb-close{display:none!important}
  .show-list-btn{display:none!important}
  #back-btn{display:none!important}
}

/* ── PENDING SCREEN ── */
#s-pending{height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1b2a,#0a2a1a)}
.pending-card{background:#fff;border-radius:14px;padding:40px 36px;text-align:center;max-width:360px;width:100%}
.pending-icon{font-size:48px;margin-bottom:12px}
.pending-h{font-size:18px;font-weight:700;margin-bottom:6px}
.pending-p{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:20px}
.pending-logout{background:none;border:1px solid #e2e8f0;border-radius:7px;padding:9px 20px;font-size:13px;color:#64748b;cursor:pointer}

/* ── ADMIN BEHEER SCREEN ── */
#s-beheer{height:100vh;flex-direction:column;background:var(--bg)}
.beheer-header{background:#0a1628;padding:14px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.beheer-back{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:0 8px 0 0}
.beheer-title{font-size:16px;font-weight:700;color:#fff}
.beheer-tabs{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;flex-shrink:0}
.beheer-tab{padding:11px 16px;font-size:12px;font-weight:500;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;color:var(--muted);white-space:nowrap;margin-bottom:-1px}
.beheer-tab.on{border-bottom-color:var(--accent-dk);color:var(--accent-dk);font-weight:600}
.beheer-body{flex:1;overflow-y:auto;padding:20px 24px}
.beheer-pane{display:none;flex-direction:column;gap:14px;max-width:680px}
.beheer-pane.on{display:flex}
.section-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.section-card-title{font-size:12px;font-weight:700;color:#374151;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.btn-green{background:var(--accent-dk);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.btn-green:hover{background:#166534}
.btn-red{background:#dc2626;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer}
.btn-grey{background:#f1f5f9;color:#475569;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer}
.user-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.user-row:last-child{border-bottom:none}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:500;color:#0f172a}
.user-email{font-size:11px;color:#94a3b8}
.role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase}
.role-badge.admin{background:#dcfce7;color:#1d4ed8}
.role-badge.coach{background:#dbeafe;color:#1d4ed8}
.role-badge.player{background:#f3e8ff;color:#7c3aed}
.role-badge.pending{background:#fef3c7;color:#d97706}
.role-select{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;outline:none}
.speler-link-select{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;outline:none;max-width:140px}
.add-form{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.add-form input{flex:1;min-width:120px;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;outline:none}
.add-form input:focus{border-color:var(--accent-dk)}

/* ── MATCH CARDS ── */
.match-list{display:flex;flex-direction:column;gap:10px}
.match-card{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.match-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
.match-head:hover{background:#f8fafc}
.match-datum{font-size:12px;font-weight:700;color:#374151;min-width:80px}
.match-opp{flex:1;font-size:13px;font-weight:500;color:#0f172a}
.match-loc{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase}
.match-loc.thuis{background:#dcfce7;color:#1d4ed8}
.match-loc.uit{background:#fee2e2;color:#dc2626}
.match-chevron{font-size:12px;color:#94a3b8;transition:transform .2s}
.match-chevron.open{transform:rotate(180deg)}
.match-body{display:none;border-top:1px solid var(--border)}
.match-body.open{display:block}
.match-teams{display:grid;grid-template-columns:1fr 1fr;gap:0}
.match-team{padding:14px 16px}
.match-team:first-child{border-right:1px solid var(--border)}
.match-team-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.match-team-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.match-score-input{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:14px;font-weight:700;text-align:center;outline:none;margin-bottom:8px}
.match-score-input:focus{border-color:var(--accent-dk)}
.match-notes{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;resize:vertical;outline:none;font-family:inherit;min-height:60px}
.match-notes:focus{border-color:var(--accent-dk)}
.match-save-row{padding:10px 16px;background:#f8fafc;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.match-add-form{background:#f8fafc;border-radius:10px;border:1px dashed var(--border);padding:16px}
.match-add-form-title{font-size:12px;font-weight:600;color:#475569;margin-bottom:12px}
.match-add-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

/* ── PLAYER VIEW ── */
#s-player{height:100vh;flex-direction:column;background:var(--bg)}
.player-view-header{background:#0a1628;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.player-view-title{font-size:15px;font-weight:700;color:#fff}
.player-view-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.player-view-nav{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;display:flex;flex-shrink:0}
.player-view-tab{padding:10px 14px;font-size:12px;font-weight:500;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;color:var(--muted);margin-bottom:-1px}
.player-view-tab.on{border-bottom-color:var(--accent-dk);color:var(--accent-dk);font-weight:600}
.player-view-body{flex:1;overflow-y:auto;padding:16px}
.pv-pane{display:none;flex-direction:column;gap:14px;max-width:580px;margin:0 auto}
.pv-pane.on{display:flex}

/* ── ADMIN BADGE IN SIDEBAR ── */
.admin-btn{width:100%;background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.25);border-radius:6px;padding:7px 10px;font-size:11px;font-weight:600;color:#fbbf24;cursor:pointer;text-align:left}
.admin-btn:hover{background:rgba(234,179,8,.2)}

@media(max-width:768px){
  .match-teams{grid-template-columns:1fr}
  .match-team:first-child{border-right:none;border-bottom:1px solid var(--border)}
  .match-add-grid{grid-template-columns:1fr}
  .beheer-body{padding:14px}
}


/* ── LINEUP SELECTOR ── */
.lineup-section{border-top:1px solid var(--border);padding:12px 16px}
.lineup-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#475569;margin-bottom:8px}
.lp-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f1f5f9}
.lp-row:last-child{border-bottom:none}
.lp-pname{flex:1;font-size:12px;color:#374151}
.lp-tb,.lp-tg{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#f8fafc;color:#94a3b8;transition:all .12s}
.lp-tb.active-b{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.lp-tg.active-g{background:#fef3c7;color:#92400e;border-color:#fcd34d}
/* ── MOTM / WEAK LINK ── */
.motm-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;border-top:1px solid var(--border)}
/* ── EVAL FORM ── */
.eval-section{background:#f8fafc;border-radius:10px;border:1px solid var(--border);margin-top:10px;overflow:hidden}
.eval-header{padding:10px 14px;background:#0a1628;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.eval-body{padding:14px;display:none;flex-direction:column;gap:12px}
.eval-body.open{display:flex}
.rating-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rating-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#fff;border-radius:6px;border:1px solid var(--border)}
.rating-name{font-size:12px;font-weight:500;color:#374151}
.rating-input{width:60px;border:1px solid var(--border);border-radius:5px;padding:4px 6px;font-size:13px;font-weight:700;text-align:center;outline:none}
.rating-input:focus{border-color:var(--accent-dk)}
@media(max-width:768px){.lineup-grid,.motm-grid,.rating-grid{grid-template-columns:1fr}}


/* ── EVAL FORM BLOCKS ── */
.eval-block{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
.eval-block-title{font-size:12px;font-weight:700;color:#0f172a;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:7px}
.eval-block-title span{font-size:16px}
.eigen-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.eigen-item{background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.eigen-label{font-size:11px;font-weight:700;color:#475569;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.score-row label{font-size:11px;color:#64748b;white-space:nowrap}
.score-input{width:60px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:15px;font-weight:700;text-align:center;outline:none}
.score-input:focus{border-color:#1d4ed8}
.eval-ta{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:12px;font-family:inherit;outline:none;resize:none;background:#fff}
.eval-ta:focus{border-color:#1d4ed8}
.radio-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.radio-opt{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:#475569;background:#f8fafc;transition:all .12s}
.radio-opt.selected{background:#0a1628;color:#fff;border-color:#0f2318}
.rating-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9}
.rating-row:last-child{border-bottom:none}
.rating-name{flex:1;font-size:12px;color:#374151}
.locked-banner{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:12px;color:#1d4ed8;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
/* ── SVM CARD ON LANDING ── */
.svm-card{background:linear-gradient(135deg,#0a1628 0%,#1d3a6e 100%);border-radius:12px;padding:16px;margin-bottom:14px;text-align:center;border:1px solid rgba(251,191,36,.2)}
.svm-label{font-size:9px;font-weight:700;letter-spacing:.12em;color:#fbbf24;text-transform:uppercase;margin-bottom:6px}
.svm-photo{width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid #fbbf24;margin:0 auto 8px;display:block}
.svm-photo-placeholder{width:70px;height:70px;border-radius:50%;background:#1e3058;border:2px solid rgba(251,191,36,.3);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:24px}
.svm-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.svm-avg{font-size:11px;color:rgba(255,255,255,.5)}
/* ── MAANDPRIJS ADMIN ── */
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.rank-nr{width:24px;height:24px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#475569;flex-shrink:0}
.rank-nr.gold{background:#fef3c7;color:#92400e}
.rank-name{flex:1;font-size:13px;font-weight:500}
.rank-score{font-size:13px;font-weight:700;color:#1d4ed8}
@media(max-width:768px){.eigen-grid{grid-template-columns:1fr}}


@media(max-width:480px){
  .login-box{padding:28px 20px!important;border-radius:16px!important;width:calc(100% - 24px)!important}
  .login-input{padding:10px 12px!important;font-size:14px!important}
  .login-btn{padding:12px!important}
}

function sbH(extra) {

  if (extra) Object.assign(h, extra);
  return h;

async function ensureToken() {
  try {
    const raw = localStorage.getItem('ksk_sb_session') || sessionStorage.getItem('ksk_sb_session');
    const s = JSON.parse(raw||'null');
    if (!s || !s.refresh) return;
    if (s.exp > Date.now()/1000 + 120) return; // still valid (2min buffer)
    // Refresh
    const r = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token', {
      method:'POST',
      headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:s.refresh})
    });
    if (!r.ok) { sbClearSession(); showFlex('s-login'); return; }
    const d = await r.json();
    sbSaveSession(d, !!localStorage.getItem('ksk_sb_session'));
  } catch(e) { console.warn('Token refresh:', e); }
}
function sbLoadSession() {
  try {
    const raw = localStorage.getItem('ksk_sb_session') || sessionStorage.getItem('ksk_sb_session');
    const s = JSON.parse(raw||'null');
    if (!s) return null;
    SB_TOKEN=s.token; SB_USER=s.user;
    // Store refresh token for later use
    if (s.refresh) window._sbRefresh = s.refresh;
    if (s.exp > Date.now()/1000 + 60) return s.user;
    // Session expired but we have it - still return user, token refresh happens on first API call
    return s.user;
  } catch(e) {}
  return null;
}

async function sbRefreshIfNeeded() {
  if (!window._sbRefresh) return false;
  try {
    const r = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token', {
      method:'POST', headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({refresh_token:window._sbRefresh})
    });
    if (!r.ok) return false;
    const d=await r.json();
    sbSaveSession(d, !!localStorage.getItem('ksk_sb_session'));
    return true;
  } catch(e) { return false; }
}
function sbSaveSession(data, remember) {
  SB_TOKEN=data.access_token; SB_USER=data.user;
  const s=JSON.stringify({token:data.access_token,refresh:data.refresh_token,user:data.user,exp:Math.floor(Date.now()/1000)+(data.expires_in||3600)});
  if(remember===false){ sessionStorage.setItem('ksk_sb_session',s); localStorage.removeItem('ksk_sb_session'); }
  else { localStorage.setItem('ksk_sb_session',s); }
}
function sbClearSession() { SB_TOKEN=null; SB_USER=null; localStorage.removeItem('ksk_sb_session'); }

async function sbSignIn(email, password, remember) {
  const r = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password', {
    method:'POST', headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({email, password})
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error_description||d.message||'Login mislukt');
  sbSaveSession(d, remember); return d;
}

  if (SB_TOKEN) fetch(SUPABASE_URL+'/auth/v1/logout',{method:'POST',headers:sbH()}).catch(()=>{});

}
async function sbGet(table, qs) {
  await ensureToken();
  const url = SUPABASE_URL+'/rest/v1/'+table+(qs?'?'+qs:'');
  const r = await fetch(url, {headers:sbH()});
  if (!r.ok) { const e=await r.json().catch(()=>({})); return {data:null,error:e}; }
  return {data:await r.json(), error:null};
}
async function sbGetOne(table, qs) {

  return {data:Array.isArray(data)?(data[0]||null):data, error:null};
}
async function sbUpsert(table, body) {
  await ensureToken();
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table, {
    method:'POST', headers:sbH({'Prefer':'resolution=merge-duplicates'}),
    body:JSON.stringify(Array.isArray(body)?body:[body])
  });
  if (!r.ok) { const e=await r.json().catch(()=>({})); return {data:null,error:e}; }
  return {data:null,error:null};
}
async function sbInsert(table, body) {
  await ensureToken();
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table, {

  });
  if (!r.ok) { const e=await r.json().catch(()=>({})); return {data:null,error:e}; }
  return {data:await r.json().catch(()=>null),error:null};
}
async function sbPatch(table, filter, body) {
  await ensureToken();
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+filter, {
    method:'PATCH', headers:sbH(), body:JSON.stringify(body)

}
async function sbDelete(table, filter) {
  await ensureToken();

  await ensureToken();

function renderCalendar(){
  const ct=$('cal-title');if(!ct)return;
  ct.textContent=MONTHS[calMonth]+' '+calYear;
  const grid=$('cal-grid');if(!grid)return;
  const firstDay=new Date(calYear,calMonth,1).getDay(),startOff=(firstDay+6)%7,days=new Date(calYear,calMonth+1,0).getDate();
  let h='';
  ['Ma','Di','Wo','Do','Vr','Za','Zo'].forEach(d=>h+='<div class="cal-day-hdr">'+d+'</div>');
  for(let i=0;i<startOff;i++)h+='<div class="cal-day empty"></div>';
  for(let day=1;day<=days;day++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isU=unavailDates.includes(ds),isR=rangeStart===ds,isT=ds===TODAY;
    h+='<div class="cal-day'+(isU?' unavail':'')+(isR?' range-start':'')+(isT?' today':'')+'" onclick="toggleDate(\''+ds+'\')">'+day+'</div>';
  }
  grid.innerHTML=h; updatePeriodSummary();
}
function toggleDate(ds){
  const isR=unavailDates.includes(ds);
  if(isR){unavailDates.splice(unavailDates.indexOf(ds),1);if(rangeStart===ds)rangeStart=null;renderCalendar();markDirty();}
  else if(!rangeStart){unavailDates.push(ds);rangeStart=ds;renderCalendar();markDirty();}
  else{const a=rangeStart<ds?rangeStart:ds,b=rangeStart<ds?ds:rangeStart;let cur=new Date(a);const end=new Date(b);while(cur<=end){const s=cur.toISOString().slice(0,10);if(!unavailDates.includes(s))unavailDates.push(s);cur.setDate(cur.getDate()+1);}rangeStart=null;renderCalendar();markDirty();}
}
function prevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function nextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function updatePeriodSummary(){
  const el=$('cal-periods');if(!el)return;
  if(!unavailDates.length){el.style.display='none';return;}
  const sorted=[...unavailDates].sort();const periods=[];let s=sorted[0],p=sorted[0];
  for(let i=1;i<sorted.length;i++){const diff=(new Date(sorted[i])-new Date(p))/86400000;if(diff<=1)p=sorted[i];else{periods.push({s,e:p});s=sorted[i];p=sorted[i];}}
  periods.push({s,e:p});
  const fmt=ds=>{const d=new Date(ds+'T00:00:00');return d.getDate()+' '+MON_SHORT[d.getMonth()]+' '+d.getFullYear();};
  el.style.display='block';el.textContent='📅 Periodes:\n'+periods.map(r=>r.s===r.e?fmt(r.s):fmt(r.s)+' – '+fmt(r.e)).join('\n');el.style.whiteSpace='pre-line';
}

// STATS
function updateStats(){
  const complete=Object.values(DB).filter(r=>calcPct(r.data||{})===100).length;
  const started=Object.values(DB).filter(r=>hasData(r.data||{})).length;
  const sn=$('stat-n');if(sn)sn.textContent=complete;
  const ft=$('foot-txt');if(ft)ft.textContent=started+'/25 ingevuld';
  const es=$('es-started');if(es)es.textContent=started;
  const ec=$('es-complete');if(ec)ec.textContent=complete;
}
function calcPct(d){if(!d)return 0;return Math.round(KEY_FIELDS.filter(f=>{const v=d[f];return v!==''&&v!==false&&v!=null;}).length/KEY_FIELDS.length*100);}
function hasData(d){return d&&Object.keys(d).some(k=>{const v=d[k];return v!==''&&v!==false&&v!=null&&!(Array.isArray(v)&&v.length===0);});}

      '<button id="lb-'+p.id+'-'+mid+'" class="lp-tb'+(inB?' active-b':'')+'" onclick="assignP('+p.id+','+mid+',\'blauw\')">Blauw</button>'+
      '<button id="lg-'+p.id+'-'+mid+'" class="lp-tg'+(inG?' active-g':'')+'" onclick="assignP('+p.id+','+mid+',\'geel\')">Geel</button>'+
    '</div>';
  }).join('');
}

function assignP(pid, mid, team) {
  const lu=getLineup(mid);
  const inTeam=lu[team].includes(pid);
  lu.blauw=lu.blauw.filter(x=>x!==pid);
  lu.geel=lu.geel.filter(x=>x!==pid);
  if(!inTeam) lu[team].push(pid);
  PLAYERS.forEach(p=>{
    const bBtn=$('lb-'+p.id+'-'+mid);
    const gBtn=$('lg-'+p.id+'-'+mid);
    if(bBtn)bBtn.className='lp-tb'+(lu.blauw.includes(p.id)?' active-b':'');
    if(gBtn)gBtn.className='lp-tg'+(lu.geel.includes(p.id)?' active-g':'');
  });
}

function toggleBMatch(id) {

// Lineup state: {matchId: {blauw:[ids], geel:[ids]}}
const lineupState={};
function getLineup(mid) {
  if(!lineupState[mid]){
    const w=wedstrijdenData.find(x=>x.id===mid)||{};
    lineupState[mid]={blauw:[...(w.blauw_spelers||[])],geel:[...(w.geel_spelers||[])]};
  }
  return lineupState[mid];
}



async function addWedstrijdBeheer() {
  const datum=$('nm-datum')?.value, opp=$('nm-opp')?.value.trim();
  if(!datum||!opp){toast('Vul datum en tegenstander in',true);return;}
  const {error}=await sbInsert('wedstrijden',{datum,tegenstander:opp,thuis_uit:nmLocatie,seizoen:'2026-27',blauw_spelers:[],geel_spelers:[]});
  if(error){toast('Fout: '+(error.message||'onbekend'),true);return;}
  if($('nm-datum'))$('nm-datum').value='';
  if($('nm-opp'))$('nm-opp').value='';
  toast('Wedstrijd toegevoegd ✓');
  loadBeheerWedstrijden();
  loadWedstrijden();
}

async function saveBWedstrijd(id) {
  const lu=getLineup(id);
  const motm=parseInt($('motm-'+id)?.value)||null;
  const wl=parseInt($('wl-'+id)?.value)||null;
  const {error}=await sbPatch('wedstrijden','id=eq.'+id,{
    blauw_score:$('bms-blauw-'+id)?.value||'',
    blauw_notities:$('bmn-blauw-'+id)?.value||'',
    geel_score:$('bms-geel-'+id)?.value||'',
    geel_notities:$('bmn-geel-'+id)?.value||'',
    blauw_spelers:lu.blauw,
    geel_spelers:lu.geel,
    man_of_match:motm,
    weak_link:wl,
    updated_at:new Date().toISOString()
  });
  if(error){toast('Fout: '+(error.message||'onbekend'),true);return;}
  // Update local cache
  const w=wedstrijdenData.find(x=>x.id===id);
  if(w){w.blauw_spelers=lu.blauw;w.geel_spelers=lu.geel;w.man_of_match=motm;w.weak_link=wl;}
  toast('Opgeslagen ✓');
  loadWedstrijden();
}

async function deleteBWedstrijd(id) {
  if(!confirm('Wedstrijd verwijderen?'))return;
  await sbDelete('wedstrijden','id=eq.'+id);
  toast('Verwijderd');
  loadBeheerWedstrijden();
  loadWedstrijden();
}

async function openEvalForm(matchId) {
  const evalDiv=$('eval-body-'+matchId);if(!evalDiv)return;
  const isOpen=evalDiv.classList.toggle('open');
  if(!isOpen)return;
  evalDiv.innerHTML='<div style="font-size:12px;color:#94a3b8;padding:8px">Laden...</div>';

  const w=wedstrijdenData.find(x=>x.id===matchId);if(!w){evalDiv.innerHTML='';return;}
  const uid=userSpelerId||(SB_USER?SB_USER.id:null);
  if(!uid){evalDiv.innerHTML='<div style="font-size:12px;color:#94a3b8;padding:8px">Geen speler gekoppeld.</div>';return;}

  const myTeam=(w.blauw_spelers||[]).includes(uid)?'blauw':(w.geel_spelers||[]).includes(uid)?'geel':null;
  const teamPlayers=myTeam==='blauw'?(w.blauw_spelers||[]):myTeam==='geel'?(w.geel_spelers||[]):[];
  const teammates=teamPlayers.filter(id=>id!==uid);
  const allPlayers=[...(w.blauw_spelers||[]),...(w.geel_spelers||[])];

  if(!myTeam){evalDiv.innerHTML='<div style="font-size:12px;color:#94a3b8;padding:8px">Je bent niet in de opstelling. Vraag de coach.</div>';return;}

  const {data:ev}=await sbGetOne('match_evaluaties','match_id=eq.'+matchId+'&beoordelaar=eq.'+uid+'&select=*');
  const locked=!!ev?.vergrendeld;
  const ratings=ev?.ratings||{};
  const ro=locked?'disabled':'';

  let html='';

  // Locked banner
  if(locked){html+='<div class="locked-banner">🔒 Evaluatie ingediend — alleen lezen</div>';}

  // ── BLOK 1: Tegenstander ──
  const sys=ev?.tegenstander_systeem||'';
  html+='<div class="eval-block">'+
    '<div class="eval-block-title"><span>⚽</span>Tegenstander</div>'+
    '<div style="font-size:11px;font-weight:600;color:#475569;margin-bottom:6px">Systeem tegenstander</div>'+
    '<div class="radio-group" id="sys-group-'+matchId+'">'+
      ['3-1-3','2-4-1','2-3-2'].map(s=>
        '<div class="radio-opt'+(sys===s?' selected':'')+'" onclick="selectSys(this,\''+matchId+'\',\''+s+'\')">'+s+'</div>'
      ).join('')+
    '</div>'+
    '<input id="sys-extra-'+matchId+'" style="width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;outline:none;margin-bottom:10px" placeholder="Andere of extra opmerking..." value="'+(ev?.tegenstander_systeem_extra||'')+'"'+(locked?' disabled':'')+'>'+
    '<div style="font-size:11px;font-weight:600;color:#475569;margin-bottom:4px">Beste speler tegenstander</div>'+
    '<input id="beste-teg-'+matchId+'" style="width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;outline:none" placeholder="Naam + nummer..." value="'+(ev?.tegenstander_beste||'')+'"'+(locked?' disabled':'')+'>'+
  '</div>';

  // ── BLOK 2: Teamgenoten beoordelen ──
  const teamColor=myTeam==='blauw'?'🔵 Blauw':'🟡 Geel';
  const ratingRows=teammates.map(id=>{
    const p=PLAYERS.find(x=>x.id===id)||{voornaam:'?',naam:''};
    return '<div class="rating-row">'+
      '<span class="rating-name">'+p.voornaam+' '+p.naam+'</span>'+
      '<input class="score-input" type="number" min="1" max="10" id="rate-'+matchId+'-'+id+'" value="'+(ratings[id]!==undefined?ratings[id]:'')+'" placeholder="—"'+(locked?' disabled':'')+'>'+
      '<span style="font-size:11px;color:#94a3b8">/10</span>'+
    '</div>';
  }).join('');

  html+='<div class="eval-block">'+
    '<div class="eval-block-title"><span>👥</span>Teamgenoten beoordelen ('+teamColor+')</div>'+
    (ratingRows||'<div style="font-size:12px;color:#94a3b8">Geen teamgenoten.</div>')+
  '</div>';

  // ── BLOK 3: Eigen prestatie ──
  html+='<div class="eval-block">'+
    '<div class="eval-block-title"><span>📊</span>Eigen prestatie</div>'+
    '<div class="eigen-grid">'+
      mkScoreBlock('B+ (aanvallend)','ep-bplus-'+matchId,ev?.eigen_b_plus,ev?.eigen_b_plus_opmerking,locked)+
      mkScoreBlock('B- (verdedigend)','ep-bmin-'+matchId,ev?.eigen_b_min,ev?.eigen_b_min_opmerking,locked)+
      mkScoreBlock('Transitie B+ → B-','ep-tbpbm-'+matchId,ev?.eigen_trans_bp_bm,ev?.eigen_trans_bp_bm_opmerking,locked)+
      mkScoreBlock('Transitie B- → B+','ep-tbmbp-'+matchId,ev?.eigen_trans_bm_bp,ev?.eigen_trans_bm_bp_opmerking,locked)+
    '</div>'+
  '</div>';

  // ── BLOK 4: MOTM / Weak Link ──
  const selOpts=(selected)=>'<option value="">— kies —</option>'+allPlayers.map(id=>{
    const p=PLAYERS.find(x=>x.id===id)||{voornaam:'?',naam:''};
    return '<option value="'+id+'"'+(selected===id?' selected':'')+'>'+p.voornaam+' '+p.naam+'</option>';
  }).join('');

  html+='<div class="eval-block">'+
    '<div class="eval-block-title"><span>🏅</span>Man of the Match & Weak Link</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
      '<div class="field"><label style="font-size:11px;font-weight:600;color:#1d4ed8">⭐ Man of the Match</label>'+
        '<select id="eval-motm-'+matchId+'" style="width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;outline:none"'+(locked?' disabled':'')+'>'+selOpts(ev?.motm)+'</select></div>'+
      '<div class="field"><label style="font-size:11px;font-weight:600;color:#dc2626">🔴 Weak Link</label>'+
        '<select id="eval-wl-'+matchId+'" style="width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;outline:none"'+(locked?' disabled':'')+'>'+selOpts(ev?.weak_link)+'</select></div>'+
    '</div>'+
  '</div>';

  if(!locked){
    html+='<button onclick="saveEvaluatie('+matchId+',['+teammates.join(',')+'])" class="btn-green" style="width:100%;padding:11px;font-size:13px;font-weight:600">💾 Indienen & vergrendelen</button>';
  }

  evalDiv.innerHTML=html;

  // Restore radio selection
  if(sys){
    const group=document.getElementById('sys-group-'+matchId);
    if(group) group.querySelectorAll('.radio-opt').forEach(el=>{
      if(el.textContent.trim()===sys)el.classList.add('selected');
    });
  }
}

function selectSys(el, matchId, val) {
  if(el.classList.contains('disabled')) return;
  const group=document.getElementById('sys-group-'+matchId);
  if(group) group.querySelectorAll('.radio-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
}

async function saveEvaluatie(matchId, teamIds) {
  const ratings={};
  teamIds.forEach(id=>{
    const v=document.getElementById('rate-'+matchId+'-'+id)?.value;
    if(v!==''&&v!==null&&v!==undefined)ratings[id]=parseInt(v);
  });
  const motm=parseInt(document.getElementById('eval-motm-'+matchId)?.value)||null;
  const wl=parseInt(document.getElementById('eval-wl-'+matchId)?.value)||null;
  const sysSel=document.querySelector('#sys-group-'+matchId+' .radio-opt.selected');
  const uid=userSpelerId||(SB_USER?SB_USER.id:null);

  const payload={
    match_id:matchId, beoordelaar:uid,
    ratings, motm, weak_link:wl,
    vergrendeld:true,
    tegenstander_systeem:sysSel?sysSel.textContent.trim():'',
    tegenstander_systeem_extra:document.getElementById('sys-extra-'+matchId)?.value||'',
    tegenstander_beste:document.getElementById('beste-teg-'+matchId)?.value||'',
    eigen_b_plus:parseInt(document.getElementById('ep-bplus-'+matchId+'-score')?.value)||null,
    eigen_b_plus_opmerking:document.getElementById('ep-bplus-'+matchId+'-opm')?.value||'',
    eigen_b_min:parseInt(document.getElementById('ep-bmin-'+matchId+'-score')?.value)||null,
    eigen_b_min_opmerking:document.getElementById('ep-bmin-'+matchId+'-opm')?.value||'',
    eigen_trans_bp_bm:parseInt(document.getElementById('ep-tbpbm-'+matchId+'-score')?.value)||null,
    eigen_trans_bp_bm_opmerking:document.getElementById('ep-tbpbm-'+matchId+'-opm')?.value||'',
    eigen_trans_bm_bp:parseInt(document.getElementById('ep-tbmbp-'+matchId+'-score')?.value)||null,
    eigen_trans_bm_bp_opmerking:document.getElementById('ep-tbmbp-'+matchId+'-opm')?.value||'',
    updated_at:new Date().toISOString()
  };

  const {error}=await sbUpsert('match_evaluaties', payload);
  if(error){toast('Fout: '+(error.message||'onbekend'),true);return;}
  toast('✓ Evaluatie ingediend en vergrendeld!');
  // Reload form in locked state
  const div=$('eval-body-'+matchId);
  if(div){div.classList.remove('open');setTimeout(()=>{div.classList.add('open');openEvalForm(matchId);},100);}
}

async function bekijkEvaluaties(matchId) {

      {l:'Trans B-→B+',v:ev.eigen_trans_bm_bp,o:ev.eigen_trans_bm_bp_opmerking},
    ].filter(x=>x.v).map(x=>'<span style="font-size:11px"><b>'+x.l+':</b> '+x.v+'/10'+(x.o?' — <em>'+x.o+'</em>':'')+'</span>').join('<br>');

      (rHtml?'<div style="margin-bottom:6px;display:flex;flex-wrap:wrap;gap:4px">'+rHtml+'</div>':'')+
      (motmP?'<div style="font-size:11px;color:#1d4ed8;margin-bottom:3px">⭐ MOTM: <b>'+motmP.voornaam+'</b></div>':'')+
      (wlP?'<div style="font-size:11px;color:#dc2626;margin-bottom:6px">🔴 Weak Link: <b>'+wlP.voornaam+'</b></div>':'')+
      (eigenHTML?'<div style="font-size:11px;line-height:1.8;color:#374151;border-top:1px solid #f1f5f9;padding-top:6px;margin-top:4px">'+eigenHTML+'</div>':'')+
    '</div>';
  }).join('');
}

async function berekenSvdM() {

  evals.forEach(ev=>{
    Object.entries(ev.ratings||{}).forEach(([id,score])=>{
      const pid=parseInt(id);
      if(!received[pid])received[pid]={total:0,count:0};
      received[pid].total+=score;received[pid].count++;
    });
  });

  const ranking=Object.entries(received)
    .map(([id,{total,count}])=>({id:parseInt(id),avg:Math.round(total/count*10)/10}))
    .sort((a,b)=>b.avg-a.avg);

  svdmSelectedId=ranking[0]?.id||null;

  const el=$('svm-rank-list');if(!el)return;
  el.innerHTML=ranking.map((r,i)=>{
    const p=PLAYERS.find(x=>x.id===r.id)||{voornaam:'?',naam:''};
    return '<div class="rank-row">'+
      '<div class="rank-nr'+(i===0?' gold':'')+'>'+(i+1)+'</div>'+
      '<div class="rank-name">'+p.voornaam+' '+p.naam+'</div>'+
      '<div class="rank-score">'+r.avg+'/10</div>'+
    '</div>';
  }).join('');

  $('svm-ranking').style.display='block';
  toast('Berekening klaar — #1 is '+(PLAYERS.find(x=>x.id===svdmSelectedId)?.voornaam||'?'));
}

async function saveSvdM() {
  if(!svdmSelectedId){toast('Geen winnaar berekend',true);return;}
  const periode=$('svm-periode')?.value.trim();
  if(!periode){toast('Vul een periodenaam in',true);return;}

  let foto_url='';
  const fotoFile=$('svm-foto')?.files[0];
  if(fotoFile){
    try { foto_url=await uploadFoto(fotoFile); }
    catch(e){ toast('Foto upload mislukt: '+e.message,true);return; }
  }

  const {error}=await sbInsert('speler_vd_maand',{
    speler_id:svdmSelectedId, periode, foto_url,
    wedstrijd_ids:svdmMatchIds,
    gemiddelde:0
  });
  if(error){toast('Fout: '+error.message,true);return;}
  toast('🏆 Speler van de Maand opgeslagen!');
  loadSvdMHuidig();
  loadSvdMLanding();
}

async function uploadFoto(file) {
  const ext=file.name.split('.').pop();
  const fname='svm_'+Date.now()+'.'+ext;
  const r=await fetch(SUPABASE_URL+'/storage/v1/object/fotos/'+fname,{
    method:'POST',
    headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SB_TOKEN,'Content-Type':file.type},
    body:file
  });
  if(!r.ok){const e=await r.json();throw new Error(e.message||'Upload fout');}
  return SUPABASE_URL+'/storage/v1/object/public/fotos/'+fname;
}

async function loadSvdMHuidig() {
  const {data}=await sbGetOne('speler_vd_maand','select=*&order=id.desc');
  const el=$('svm-huidig');const cont=$('svm-huidig-content');
  if(!data||!el||!cont)return;
  el.style.display='block';
  const p=PLAYERS.find(x=>x.id===data.speler_id)||{voornaam:'?',naam:''};
  cont.innerHTML='<div style="display:flex;align-items:center;gap:12px">'+
    (data.foto_url?'<img src="'+data.foto_url+'" style="width:50px;height:50px;border-radius:50%;object-fit:cover">':'<div style="width:50px;height:50px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:20px">⭐</div>')+
    '<div><div style="font-size:14px;font-weight:700">'+p.voornaam+' '+p.naam+'</div>'+
    '<div style="font-size:12px;color:#64748b">'+data.periode+'</div></div></div>';
}

async function loadSvdMLanding() {
  const {data}=await sbGetOne('speler_vd_maand','select=*&order=id.desc');
  const el=$('svm-landing');if(!el)return;
  if(!data){el.style.display='none';return;}
  el.style.display='block';
  const p=PLAYERS.find(x=>x.id===data.speler_id)||{voornaam:'?',naam:''};
  $('svm-landing-name').textContent=p.voornaam+' '+p.naam;
  $('svm-landing-periode').textContent=data.periode;
  const wrap=$('svm-photo-wrap');
  if(wrap){
    if(data.foto_url){wrap.outerHTML='<img class="svm-photo" id="svm-photo-wrap" src="'+data.foto_url+'" alt="'+p.voornaam+'">';}
    else{wrap.innerHTML='⭐';}
  }
}



function showLoginTab(tab) {
  const isLogin = tab === 'login';
  $('form-login').style.display    = isLogin ? 'block' : 'none';
  $('form-register').style.display = isLogin ? 'none'  : 'block';
}

async function doRegister() {
  const vn   = $('reg-voornaam')?.value.trim();
  const nm   = $('reg-naam')?.value.trim();
  const email= $('reg-email')?.value.trim();
  const pwd  = $('reg-pwd')?.value;
  const pwd2 = $('reg-pwd2')?.value;
  const err  = $('reg-err');
  if(!vn||!nm||!email||!pwd){err.textContent='Vul alle velden in.';return;}
  if(pwd.length<6){err.textContent='Wachtwoord minimaal 6 tekens.';return;}
  if(pwd!==pwd2){err.textContent='Wachtwoorden komen niet overeen.';return;}
  const btn=$('reg-btn'); btn.disabled=true; btn.textContent='Bezig…'; err.textContent='';
  try {
    // 1. Signup in Supabase Auth
    const r = await fetch(SUPABASE_URL+'/auth/v1/signup',{
      method:'POST',
      headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pwd})
    });
    const d = await r.json();
    if(!r.ok||d.error) throw new Error(d.error_description||d.msg||d.error||'Registratie mislukt');

    // 2. Login to get token
    await sbSignIn(email,pwd,true);

    // 3. Add to user_roles as pending
    await sbInsert('user_roles',{
      user_id:SB_USER.id, role:'pending',
      naam:vn+' '+nm, email
    });

    // 4. Show pending screen
    hide('s-login'); showFlex('s-pending');
    toast('Account aangemaakt! Wacht op activatie door de coach.');
  } catch(e) {
    err.textContent = e.message||'Fout bij registratie';
    btn.disabled=false; btn.textContent='Account aanmaken';
  }
}

// START
init();


</script>
